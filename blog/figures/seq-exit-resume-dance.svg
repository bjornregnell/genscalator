  <path class="msg" fill="none" d="M 205.2 348 L 196.2 352 L 205.2 356"/>
  <text class="lbl" x="548.6" y="345" text-anchor="middle">fresh process, new env (token) inherited</text>
  <line class="msg" x1="196.2" y1="398" x2="547.6" y2="398"/>
  <path class="head" stroke="none" d="M 548.6 398 L 539.6 394 L 539.6 402 Z"/>
  <text class="lbl" x="372.4" y="391" text-anchor="middle">resume (state recovered)</text>
</svg>
