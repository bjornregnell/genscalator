<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>genscalator</title>
<!-- FIRST PROTO 2026-07-16. Photos: blacksmith work by BR's wife (consent given). TODO: add her name as credit;
     confirm tagline; confirm bg shade (#000 vs #3d3c3d). -->
<style>
  :root { color-scheme: dark; --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #3d3c3d;              /* graphite (matches bjornregnell.se), not pure black */
    color: #f0f0f0;
    font-family: "Courier New", Courier, monospace;
    overflow: hidden;                 /* single-screen hero */
  }

  .hero { position: relative; width: 100vw; height: 100dvh; overflow: hidden; }

  /* carousel: all photos stacked, object-fit cover, crossfaded by toggling .show */
  .carousel { position: absolute; inset: 0 0 0 40%; }   /* photo occupies the RIGHT 60%; left 40% = bg (see .scrim) */
  .carousel img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; object-position: 60% center;
    opacity: 0; transition: opacity 2s ease-in-out;
    /* feather the photo's own LEFT edge into transparent so it dissolves into the #000 bg (no hard cut) */
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 26%);
            mask-image: linear-gradient(to right, transparent 0, #000 26%);
  }
  .carousel img.show { opacity: 1; }

  /* left scrim so the text stays readable over any photo */
  .scrim {
    position: absolute; inset: 0; z-index: 1;
    /* solid graphite over the left panel, then a soft fade (starting ~24%) so the photo emerges from the
       graphite bg; transparent by ~58% so the mid-photo action keeps its brightness (not dimmed) */
    background: linear-gradient(to right,
      #3d3c3d 0%, #3d3c3d 34%, rgba(61,60,61,0.55) 48%, rgba(61,60,61,0) 68%, transparent 100%);
  }

  .overlay {
    position: absolute; top: 0; left: 0; height: 100%;
    max-width: 46vw; padding: 6vh 4vw;
    display: flex; flex-direction: column; justify-content: center;
    z-index: 2;
  }
  .name {
    font-family: Rockwell, "Roboto Slab", "DejaVu Serif", Georgia, "Times New Roman", serif;
    font-size: clamp(2.4rem, 6vw, 5rem); font-weight: 700; color: #ffffff;
    letter-spacing: 0.02em; margin-bottom: 0.35em;
  }
  .tagline {
    font-family: var(--sans);
    font-size: clamp(1.5rem, 3.6vw, 2.6rem); color: #c8c8c8;   /* slogan: sized so line 1 ~ heading width */
    max-width: 34ch; line-height: 1.5; margin-bottom: 2em;
  }
  .about {
    font-family: var(--sans);
    font-size: clamp(1.05rem, 1.8vw, 1.3rem); color: #c0c0c0;
    max-width: 42ch; line-height: 1.5; margin-top: 1.8em;
  }
  nav a {
    display: block; color: #e0e0e0; text-decoration: none;
    font-size: clamp(1.5rem, 3.6vw, 2.6rem); font-weight: 700; margin: 0.4em 0;   /* nav links == slogan size */
  }
  nav a::before { content: "> "; color: #8fbf8f; }
  nav a:hover { text-decoration: underline; color: #ffffff; }
  .credit { font-family: var(--sans); font-style: italic; margin-top: 2.4em; font-size: clamp(0.95rem, 1.55vw, 1.2rem); color: #8a8a8a; }

  /* portrait (phone upright): keep the overlay, swap to a top-to-bottom scrim so text sits over a dark band */
  @media (orientation: portrait) {
    .carousel { inset: 0; }   /* full-bleed photo in portrait; the left-20% panel is a landscape-only idea */
    .overlay { max-width: 100%; padding: 9vh 7vw; justify-content: flex-start; }
    .scrim {
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.55) 45%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.8) 100%);
    }
  }
</style>
</head>
<body>
<div class="hero">
  <div class="carousel">
    <img src="img/axe-0.jpg" alt="Hand-forged blacksmith work" class="show">
    <img src="img/axe-1.jpg" alt="">
    <img src="img/axe-2.jpg" alt="">
    <img src="img/axe-3.jpg" alt="">
  </div>
  <div class="scrim"></div>
  <div class="overlay">
    <p class="name">genscalator</p>
    <p class="tagline">Power tools for agents:<br>smarter, safer, faster.</p>
    <nav>
      <a href="blog/">blog</a>
      <a href="https://codeberg.org/bjornregnell/genscalator">repo</a>
      <a href="blog/000-why-genscalator.html">why</a>
      <a href="security/">security</a>
    </nav>
    <p class="about">Genscalator is a typed Scala toolbox and habits for more productive agentic software engineering.</p>
    <p class="credit">Blacksmith photography by Susanne R.<br>Built and bootstrapped with her own tools.</p>
  </div>
</div>
<script>
(function () {
  var imgs = Array.prototype.slice.call(document.querySelectorAll('.carousel img'));
  if (imgs.length < 2) return;
  var i = 0;
  setInterval(function () {
    imgs[i].classList.remove('show');
    i = (i + 1) % imgs.length;
    imgs[i].classList.add('show');
  }, 4500);   // ~4.5s per photo, 2s crossfade
})();
</script>
</body>
</html>
