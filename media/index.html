<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>genscalator</title>
<!-- FIRST PROTO 2026-07-16. Photos: blacksmith work by BR's wife (consent given). TODO: add her name as credit;
     confirm tagline; confirm bg shade (#000 vs #3d3c3d). -->
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="hero">
  <div class="carousel" style="--zoom: 1.2; --pan: 8%">   <!-- zoom in for horizontal slack, then pan RIGHT so axe-3's anvil-hole nears the right edge -->

    <!-- axe-0.jpg intentionally not shown (Susanne: a failed axe); file kept in img/ -->
    <img src="img/axe-1.jpg" alt="Hand-forged blacksmith work" class="show">
    <img src="img/axe-2.jpg" alt="">
    <img src="img/axe-3.jpg" alt="">
  </div>
  <div class="scrim"></div>
  <div class="overlay">
    <p class="name">genscalator</p>
    <p class="tagline">power tools for agents and <em>humans</em></p>
    <nav>
      <a href="blog/">blog</a>
      <a href="https://codeberg.org/bjornregnell/genscalator">repo</a>
      <a href="blog/000-why-genscalator.html">why</a>
      <a href="security/">security</a>
    </nav>
    <p class="about"><span class="hio">genscalator</span> is a safe toolbox with workflows for productive agentic software engineering.</p>
    <p class="credit">Blacksmith photography by Susanne R. She forged the axe with tools she had forged herself. That is bootstrapping in action.</p>
  </div>
</div>
<script>
(function () {
  var imgs = Array.prototype.slice.call(document.querySelectorAll('.carousel img'));
  if (imgs.length < 2) return;
  var i = 0;
  setInterval(function () {
    imgs[i].classList.remove('show');
    i = (i + 1) % imgs.length;
    imgs[i].classList.add('show');
  }, 6000);   // ~6s per photo, 3s crossfade
})();
</script>
</body>
</html>
