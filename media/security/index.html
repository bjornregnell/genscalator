<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>genscalator security</title>
<!-- 2026-07-17. Same hero/carousel template as the landing; lock photos by Susanne R.
     GUESSED (adjust): the .name, the .tagline (kept from the landing as a placeholder), and the nav set. -->
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="hero">
  <div class="carousel">
    <img src="../img/black-smith-lock-1.jpg" alt="Hand-forged lock" class="show">
    <img src="../img/black-smith-lock-2.jpg" alt="">
    <img src="../img/black-smith-lock-3.jpg" alt="">
    <img src="../img/black-smith-lock-4.jpg" alt="">
  </div>
  <div class="scrim"></div>
  <div class="overlay">
    <p class="name">genscalator security</p>
    <p class="tagline">no risky things by design</p>
    <nav>
      <a href="security-model.html">security model</a>
      <a href="../">home</a>
      <a href="../blog/">blog</a>
      <a href="https://codeberg.org/bjornregnell/genscalator">repo</a>
      <a href="../blog/000-why-genscalator.html">why</a>
    </nav>
    <p class="about"><span class="hio">genscalator</span> is a safe toolbox with workflows for productive agentic software engineering.</p>
    <p class="credit">Photos by Susanne R. showing locks bought at flea market by her blacksmith teacher.</p>
  </div>
</div>
<script>
(function () {
  var imgs = Array.prototype.slice.call(document.querySelectorAll('.carousel img'));
  if (imgs.length < 2) return;
  var i = 0;
  setInterval(function () {
    imgs[i].classList.remove('show');
    i = (i + 1) % imgs.length;
    imgs[i].classList.add('show');
  }, 6000);   // ~6s per photo, 3s crossfade
})();
</script>
</body>
</html>
